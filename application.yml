server:
  port: 8010
  jetty:
    max-http-form-post-size: 2gb
spring:
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:batchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  servlet:
    multipart:
      max-file-size: 2GB
      max-request-size: 5GB
logging:
  level:
    root: INFO
    com.ceilbhin.sigil: DEBUG
  file:
    name: logs/application.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
sigil:
  font:
    size: 48
    format: "\\:%a %Y-%m-%d %H\\\\\\:%M\\\\\\:%S}"
    path: fonts/RealVhsFont-Normalised.ttf
    location:
      x: "w-tw-20"
      y: "h-th-20"
  media:
    base-dir: "D:/Media/test/"
    sub-dir-pattern: "yyyy"
    date-pattern: "yyyy.MM.dd"
    filename-pattern: "{date} {title}"
    default-title: "export"

